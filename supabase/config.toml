# Supabase project config
# Project ref from your URL: nrvqmjjbhdnayadotjeg
project_id = "nrvqmjjbhdnayadotjeg"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
# CORS da API PostgREST: em produção configure também em Project Settings → API.
# additional_allowed_origins = ["https://seu-frontend.vercel.app"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

# Auth: emails e tokens
[auth.email]
# Validade do link de confirmação em segundos (2592000 = 30 dias, sem limite prático)
otp_expiry = 2592000

# Template de email de confirmação personalizado (por empresa)
[auth.email.template.confirmation]
subject = "Confirmar seu cadastro"
content_path = "./supabase/templates/confirmation.html"

# Edge Functions: create-client-account permite cadastro sem JWT (usuário não autenticado)
[functions.create-client-account]
verify_jwt = false
